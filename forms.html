<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Alien Abduction Order Form</title>
	<link href="css/forms.css" rel="stylesheet">
</head>
<body>
	<div class="wrapper">
		<section>
			<h1>Alien Abduction Order Form</h1>
			<p>Fill out the form below to place an order for an alien abduction by one of our fine UFOs.</p>
			<form action="
			https://e3vwdl4bpd.execute-api.us-west-2.amazonaws.com/default/API2SES
			" method="POST">
				<input type="hidden"
				name="send_to" 
				value="hyun_eon@naver.com">
				<fieldset>
					<legend>Your contact information</legend>
					<label for="name">Your name </label>
						<input type="text"
						id="name"
						name="name">
					<label for="phone">Phone number</label>
						<input type="tel"
						id="phone"
						name="phone"
						placeholder="Don't forget your area code!">
					<label for="email">Email</label>
						<input type="email"
						id="email"
						name="email">
				</fieldset>
			<fieldset>
			<legend>About your abduction </legend>
			<label for="date">Requested date</label>
			<input type="date"
					id="date"
					name="date">
			<label for="qty">How many people would you like abducted?</label>
			<input type="number"
						id="qty"
						name="qty"
						min="1"
						max="10">
			<p>What type of UFO do you prefer?</p>
				<label>
					<input type="radio"
					name="ufotype"
					value="Classic"
					checked>
					Classic oval UFO
				</label>
				<label>
					<input type="radio"
					name="ufotype"
					value="starwars">
					Star Wars-style Imperial cruiser
				</label>	
				<label>
					<input type="radio"
					name="ufotype"
					value="galactica">
					Battlestar Galactica-style Viper
				</label>
				<label>
					<input type="radio"
					name="ufotype"
					value="borg">
					Borg-style cube
				</label>
			<label for="abtype">What type of abduction experience do you want?</label>
				<select id="abtype" name="abtype">
					<option selected>Select one..</option>
					<option value="tour">Tour of the solar system</option>
					<option value="dinner">Alien dinner and discussion</option>
					<option value="dance">Alien dance lessons</option>
					<option value="whales">Whale watching</option>
				</select>
			<label for="comment">Special requests:</label>
			<textarea name="comment"
			id="comment">
			</textarea>
			<label>
				<input type="checkbox"
				value="subscribe"
				name="subscribe"
				id="subscribe" checked>Add me to your email list!
			</label>
			</fieldset>
			<button type="submit">Submit</button>
			</form>				
		</section>
		<aside>
			<h3>Our Location</h3>
			<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d50680.69636584304!2d126.84615853259922!3d37.44788703384051!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b63396a244c1f%3A0xf9b010990ae9c398!2z66-47Iud64u5!5e0!3m2!1sko!2skr!4v1655132623247!5m2!1sko!2skr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
			<address>
				Frontend Masters &middot;
				60 South 6th Street &middot;
				Suite 3625 &middot;
				Minneapolis, MN 55402
			</address>
		</aside>
	</div>
	<script src="js/forms.js"></script>
</body>
</html>
